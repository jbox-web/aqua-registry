# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: goreleaser
    repo_name: goreleaser
    description: Release engineering, simplified
    asset: goreleaser_{{.OS}}_{{.Arch}}.{{.Format}}
    format: tar.gz
    replacements:
      386: i386
      amd64: x86_64
      darwin: Darwin
      linux: Linux
      windows: Windows
    checksum:
      type: github_release
      asset: checksums.txt
      algorithm: sha256
    overrides:
      - goos: windows
        format: zip
