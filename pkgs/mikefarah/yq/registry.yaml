# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: mikefarah
    repo_name: yq
    description: yq is a portable command-line YAML processor
    asset: yq_{{.OS}}_{{.Arch}}
    checksum:
      type: github_release
      asset: checksums
      algorithm: sha256
    supported_envs:
      - darwin
      - linux
      - windows
