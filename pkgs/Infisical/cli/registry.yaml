# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: Infisical
    repo_name: cli
    description: The official CLI of Infisical
    asset: cli_{{trimV .Version}}_{{.OS}}_{{.Arch}}.tar.gz
    checksum:
      type: github_release
      asset: checksums.txt
      algorithm: sha256
    files:
      - name: infisical
    supported_envs:
      - darwin/amd64
      - darwin/arm64
      - linux/amd64
      - linux/arm64
      - linux/386
      - windows/amd64
