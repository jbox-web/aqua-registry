# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: php
    repo_name: frankenphp
    description: The modern PHP app server
    asset: frankenphp-{{.OS}}-{{.Arch}}
    format: raw
    replacements:
      amd64: x86_64
      darwin: mac
    overrides:
      - goos: linux
        replacements:
          arm64: aarch64
    supported_envs:
      - darwin
      - linux
