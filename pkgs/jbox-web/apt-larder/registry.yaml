# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: jbox-web
    repo_name: apt-larder
    description: "apt-larder - stock your packages, serve them fresh"
    asset: apt-larder-{{.OS}}-{{.Arch}}
    format: raw
    checksum:
      type: github_release
      asset: "{{.Asset}}.sha256"
      algorithm: sha256
    supported_envs:
      - darwin
      - linux
